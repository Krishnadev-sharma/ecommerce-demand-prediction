name: Train Models

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy==1.26.4 scikit-learn==1.4.0 xgboost==2.0.3 \
                      lightgbm==4.3.0 pandas==2.1.4 joblib==1.3.2 matplotlib==3.8.2 seaborn==0.13.2

      - name: Generate data & train models
        run: |
          python src/data_preprocessing.py
          python src/feature_engineering.py
          python src/train_model.py

      - name: Commit trained models
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add models/
          git diff --staged --quiet || git commit -m "Auto-trained models [skip ci]"
          git push
